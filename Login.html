<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Origami Oasis</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #f4f6f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background: #ffffff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      width: 300px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      color: #333;
    }

    h1 span {
      color: #7aaea3;
    }

    p {
      font-size: 14px;
      color: #777;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #7aaea3;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #7aaea3;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }

    button:hover {
      background: #65968c;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #999;
    }

    .footer a {
      color: #7aaea3;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Origami <span>Oasis</span></h1>
    <p>Welcome back! Please login</p>

    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

    <button>Login</button>

    <div class="footer">
      Don’t have an account? <a href="#">Sign up</a>
    </div>
  </div>
</body>
</html>
